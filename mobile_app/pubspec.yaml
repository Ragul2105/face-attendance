name: face_attendance_app
description: Face Recognition Attendance Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Camera
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # Networking
  http: ^1.2.0
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # Image Processing
  image: ^4.1.6

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.2
  permission_handler: ^11.2.0
  file_picker: ^8.1.7
  geolocator: ^12.0.0

  # Firebase (optional, if you want to use Firebase auth in mobile)
  # firebase_core: ^2.24.2
  # cloud_firestore: ^4.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Add assets here
  # assets:
  #   - assets/images/
  #   - assets/icons/
